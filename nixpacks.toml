[phases.setup]
nixPkgs = ["nodejs-18_x", "python3", "python3Packages.pip"]

[phases.install]
cmds = [
  "pip install pdfplumber --break-system-packages --quiet || pip3 install pdfplumber --quiet || true",
  "cd client && npm install",
  "cd server && npm install"
]

[phases.build]
cmds = [
  "cd client && npm run build"
]

[start]
cmd = "cd server && node src/index.js"
